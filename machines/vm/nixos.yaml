vmType: vz
arch: aarch64
memory: 8GiB
cpus: 4
disk: 60GiB
mountType: virtiofs
mounts:
  - location: "~"
    writable: true
user:
  name: lima
  shell: /run/current-system/sw/bin/zsh
  home: /home/lima
containerd:
  system: false
  user: false
images:
  - location: "https://github.com/nixos-lima/nixos-lima/releases/download/v0.0.4/nixos-lima-v0.0.4-aarch64.qcow2"
    arch: "aarch64"
